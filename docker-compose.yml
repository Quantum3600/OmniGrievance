
services:
  # PostGIS Database for spatial querying and public records
  db:
    image: postgis/postgis:15-3.3
    container_name: omnigrievance-db
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d omnigrievance" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for millisecond-latency dashboards
  redis:
    image: redis:7-alpine
    container_name: omnigrievance-cache
    ports:
      - "6379:6379"

  # FastAPI Backend Orchestration Engine
  backend:
    build: ./backend
    container_name: omnigrievance-backend
    env_file:
      - ./backend/.env
    environment:
      # Explicit override — ensures mock mode even if .env has CRLF issues on Windows
      USE_MOCK_APIS: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Next.js PWA Frontend
  frontend:
    build: ./frontend
    container_name: omnigrievance-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
